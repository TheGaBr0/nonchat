name: Build nonchat

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/maven.yml'
      - 'pom.xml'
      - '**/pom.xml'
      - 'api/**'
      - 'core/**'
      - 'plugin/**'
      - 'v1_16_R3/**'
      - 'v1_17_R1/**'
      - 'v1_18_R2/**'
      - 'v1_19_R3/**'
      - 'v1_20_R4/**'
      - 'v1_21_R1/**'
      - 'v26_1_R1/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/maven.yml'
      - 'pom.xml'
      - '**/pom.xml'
      - 'api/**'
      - 'core/**'
      - 'plugin/**'
      - 'v1_16_R3/**'
      - 'v1_17_R1/**'
      - 'v1_18_R2/**'
      - 'v1_19_R3/**'
      - 'v1_20_R4/**'
      - 'v1_21_R1/**'
      - 'v26_1_R1/**'

concurrency:
  group: maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build plugin reactor
        run: mvn -B -ntp clean package -DskipTests -pl plugin -am

      - name: Verify shaded artifact
        run: |
          ls -lh plugin/target
          find plugin/target -maxdepth 1 -type f -name 'nonchat-*.jar' | grep .
          ls -lh plugin/target/nonchat-*.jar
          echo "Build successful"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: nonchat-${{ github.sha }}
          path: |
            plugin/target/nonchat-*.jar
            !plugin/target/original-*.jar
          retention-days: 30

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
        if: github.ref == 'refs/heads/main'